{% extends "base.html" %}

{% block content %}
<h1>✏️ Редактирование трека</h1>

<div class="edit-form-container">
    <form method="POST" class="edit-form">
        <div class="form-group">
            <label>Название трека</label>
            <input type="text" name="title" value="{{ track.title }}" required>
        </div>
        
        <div class="form-group">
            <label>Исполнитель</label>
            <input type="text" name="artist" value="{{ track.artist }}" required>
        </div>
        
        <div class="form-group">
            <label>Жанр</label>
            <input type="text" name="genre" value="{{ track.genre or '' }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="save-btn">💾 Сохранить изменения</button>
            <a href="/track/{{ track.id }}" class="cancel-btn">❌ Отмена</a>
        </div>
    </form>
    
    <div class="edit-info">
        <p>📝 <strong>Примечание:</strong> Комментарии и лайки сохранятся после редактирования.</p>
    </div>
</div>

<style>
.edit-form-container {
    max-width: 600px;
    margin: 0 auto;
    background: #1e1e1e;
    padding: 30px;
    border-radius: 15px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #1db954;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: #fff;
    font-size: 16px;
}

.form-group input:focus {
    outline: none;
    border-color: #1db954;
}

.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 25px;
}

.save-btn {
    background: #1db954;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    text-decoration: none;
    display: inline-block;
}

.save-btn:hover {
    background: #1ed760;
}

.cancel-btn {
    background: #444;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    text-decoration: none;
    display: inline-block;
}

.cancel-btn:hover {
    background: #555;
}

.edit-info {
    margin-top: 20px;
    padding: 15px;
    background: #2a2a2a;
    border-radius: 10px;
    color: #aaa;
}
</style>
{% endblock %}
