{% extends "base.html" %}

{% block content %}
<h1>Загрузить трек</h1>
<form method="POST" enctype="multipart/form-data" class="upload-form">
    <input type="text" name="title" placeholder="Название трека" required>
    <input type="text" name="artist" placeholder="Исполнитель" required>
    <input type="text" name="genre" placeholder="Жанр">
    <input type="file" name="audio_file" accept=".mp3" required>
    <button type="submit">Загрузить</button>
</form>
{% endblock %}
